services:
  - type: web
    name: family-app-api
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    preDeployCommand: npm run db:deploy --workspace @family-app/server
    dockerCommand: npm run start --workspace @family-app/server
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: family-app-postgres
          property: connectionString
      - key: PORT
        value: "10000"
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ISSUER
        value: family-app-api
      - key: JWT_AUDIENCE
        value: family-app-mobile
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: AUTH_REQUIRED
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: MFA_ISSUER
        value: Family App
      - key: MFA_RETURN_SECRET
        value: "false"
      - key: WORKER_POLL_MS
        value: "1000"
      - key: WORKER_LEASE_MS
        value: "60000"
      - key: WORKER_BATCH_SIZE
        value: "10"
      - key: CRON_INTERVAL_MS
        value: "60000"
      - key: CRON_BATCH_SIZE
        value: "50"

  - type: worker
    name: family-app-worker
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    dockerCommand: npm run worker --workspace @family-app/server
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: family-app-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ISSUER
        value: family-app-api
      - key: JWT_AUDIENCE
        value: family-app-mobile
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: AUTH_REQUIRED
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: MFA_ISSUER
        value: Family App
      - key: MFA_RETURN_SECRET
        value: "false"
      - key: WORKER_POLL_MS
        value: "1000"
      - key: WORKER_LEASE_MS
        value: "60000"
      - key: WORKER_BATCH_SIZE
        value: "10"
      - key: CRON_INTERVAL_MS
        value: "60000"
      - key: CRON_BATCH_SIZE
        value: "50"

  - type: worker
    name: family-app-cron
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    dockerCommand: npm run cron --workspace @family-app/server
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: family-app-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ISSUER
        value: family-app-api
      - key: JWT_AUDIENCE
        value: family-app-mobile
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: AUTH_REQUIRED
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: MFA_ISSUER
        value: Family App
      - key: MFA_RETURN_SECRET
        value: "false"
      - key: WORKER_POLL_MS
        value: "1000"
      - key: WORKER_LEASE_MS
        value: "60000"
      - key: WORKER_BATCH_SIZE
        value: "10"
      - key: CRON_INTERVAL_MS
        value: "60000"
      - key: CRON_BATCH_SIZE
        value: "50"

databases:
  - name: family-app-postgres
    region: frankfurt
    plan: basic-256mb
    databaseName: family_app
    postgresMajorVersion: "16"
    diskSizeGB: 1
